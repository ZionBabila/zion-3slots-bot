name: Find Notion Database IDs

on:
  workflow_dispatch:

jobs:
  find-databases:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install notion-client==2.2.1 -q
      - name: List all accessible databases
        run: |
          python3 -c "
          import os
          from notion_client import Client
          client = Client(auth=os.environ['NOTION_TOKEN'])

          # Search all objects (pages + databases)
          all_results = client.search()
          print('=== ALL OBJECTS ACCESSIBLE TO YOUR INTEGRATION ===')
          for item in all_results['results']:
              obj_type = item.get('object')
              item_id = item.get('id')
              if obj_type == 'database':
                  title = ''.join([t.get('plain_text','') for t in item.get('title', [])])
                  print(f'DATABASE | ID: {item_id} | Title: {title}')
              elif obj_type == 'page':
                  props = item.get('properties', {})
                  title = ''
                  for p in props.values():
                      if p.get('type') == 'title':
                          title = ''.join([t.get('plain_text','') for t in p.get('title', [])])
                  print(f'PAGE     | ID: {item_id} | Title: {title}')
          print()
          print('Total objects found:', len(all_results['results']))
          "
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
