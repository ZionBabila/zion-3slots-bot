name: Find Notion Database IDs

on:
  workflow_dispatch:

jobs:
  find-databases:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install notion-client==2.2.1 -q
      - name: Find embedded database inside the 3-Slots page
        run: |
          python3 -c "
          import os
          from notion_client import Client
          client = Client(auth=os.environ['NOTION_TOKEN'])

          PAGE_ID = '32c0974de5ae81c1960cf88c898f6340'

          print('=== SEARCHING FOR DATABASES IN PAGE', PAGE_ID, '===')
          # Get all child blocks of the page
          children = client.blocks.children.list(block_id=PAGE_ID)
          for block in children.get('results', []):
              btype = block.get('type')
              bid = block.get('id')
              print(f'Block type: {btype} | ID: {bid}')
              if btype == 'child_database':
                  title = block.get('child_database', {}).get('title', '')
                  print(f'  >>> FOUND DATABASE: {title} | ID: {bid}')
          print()
          print('=== ALSO SEARCHING WORKSPACE ===')
          results = client.search()
          for item in results.get('results', []):
              print(f\"{item['object']} | {item['id']}\")
          "
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
