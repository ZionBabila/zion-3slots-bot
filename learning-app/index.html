const C = {
  bg: "#0f0f1a", card: "#1a1a2e", border: "#2d2d4e",
  primary: "#7c3aed", primaryLight: "#a855f7",
  success: "#10b981", error: "#ef4444", warning: "#f59e0b",
  text: "#e2e8f0", muted: "#94a3b8", code: "#1e293b", codeText: "#a5f3fc"
};

function ProgressBar({ value, max, color = C.primary }) {
  return (
    <div style={{ background: "#1e293b", borderRadius: 8, height: 10, overflow: "hidden" }}>
      <div style={{
        width: `${Math.min((value / max) * 100, 100)}%`,
        height: "100%", background: color, borderRadius: 8, transition: "width 0.4s ease"
      }} />
    </div>
  );
}

function CodeBlock({ code }) {
  return (
    <pre style={{
      background: C.code, border: "1px solid #334155", borderRadius: 8,
      padding: 14, fontSize: 12.5, color: C.codeText, lineHeight: 1.7,
      fontFamily: "'Courier New', monospace", overflowX: "auto", direction: "ltr", textAlign: "left"
    }}>{code}</pre>
  );
}

function Pill({ children, color = C.primary }) {
  return (
    <span style={{
      background: color + "28", color, border: `1px solid ${color}55`,
      borderRadius: 20, padding: "2px 10px", fontSize: 11, fontWeight: 700
    }}>{children}</span>
  );
}

function Btn({ children, onClick, disabled, variant = "primary", style = {} }) {
  const base = {
    border: "none", borderRadius: 12, padding: "14px 18px",
    fontSize: 15, fontWeight: 700, cursor: disabled ? "not-allowed" : "pointer",
    width: "100%", transition: "opacity 0.15s", ...style
  };
  if (variant === "primary")
    return <button onClick={onClick} disabled={disabled}
      style={{ ...base, background: disabled ? "#334155" : `linear-gradient(135deg, ${C.primary}, #06b6d4)`, color: "white" }}>{children}</button>;
  if (variant === "ghost")
    return <button onClick={onClick} style={{ ...base, background: C.card, border: `1px solid ${C.border}`, color: C.text }}>{children}</button>;
  return <button onClick={onClick} style={base}>{children}</button>;
}

function QuizScreen({ questions, topicData, onComplete }) {
  const [cur, setCur] = React.useState(0);
  const [selected, setSelected] = React.useState(null);
  const [score, setScore] = React.useState(0);

  const q = questions[cur];
  const isLast = cur === questions.length - 1;

  const pick = (idx) => {
    if (selected !== null) return;
    setSelected(idx);
    if (idx === q.correct) setScore(s => s + 1);
  };

  const next = () => {
    const finalScore = score + (selected === q.correct ? 1 : 0);
    if (isLast) { onComplete(finalScore); return; }
    setCur(c => c + 1);
    setSelected(null);
  };

  const optStyle = (idx) => {
    if (selected === null) return { bg: "#1e293b", border: "#334155", color: C.text };
    if (idx === q.correct) return { bg: C.success + "20", border: C.success, color: C.success };
    if (idx === selected) return { bg: C.error + "20", border: C.error, color: C.error };
    return { bg: "#1e293b", border: "#2d3748", color: C.muted };
  };

  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.text, padding: 20 }}>
      {/* Progress */}
      <div style={{ marginBottom: 18 }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
          <span style={{ fontSize: 12, color: C.muted }}>שאלה {cur + 1} / {questions.length}</span>
          <span style={{ fontSize: 12, color: C.warning }}>⚡ {score} נכונות</span>
        </div>
        <ProgressBar value={cur + (selected !== null ? 1 : 0)} max={questions.length} />
      </div>

      <div style={{ textAlign: "center", fontSize: 30, marginBottom: 14 }}>{topicData.icon}</div>

      {/* Question */}
      <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: 18, marginBottom: 14 }}>
        <p style={{ margin: 0, fontSize: 14.5, fontWeight: 600, lineHeight: 1.65 }}>{q.q}</p>
      </div>

      {/* Options */}
      <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 14 }}>
        {q.opts.map((opt, idx) => {
          const s = optStyle(idx);
          const letter = idx === q.correct && selected !== null ? "✓"
            : idx === selected && idx !== q.correct ? "✗"
            : String.fromCharCode(65 + idx);
          return (
            <button key={idx} onClick={() => pick(idx)} style={{
              background: s.bg, border: `2px solid ${s.border}`, borderRadius: 12,
              padding: "13px 16px", color: s.color, fontSize: 13.5, textAlign: "right",
              cursor: selected === null ? "pointer" : "default",
              display: "flex", alignItems: "center", gap: 10, transition: "all 0.18s"
            }}>
              <span style={{
                width: 28, height: 28, borderRadius: 6, background: s.border + "33",
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 12, fontWeight: 700, flexShrink: 0
              }}>{letter}</span>
              {opt}
            </button>
          );
        })}
      </div>

      {/* Explanation */}
      {selected !== null && (
        <div style={{
          background: selected === q.correct ? C.success + "12" : C.error + "12",
          border: `1px solid ${selected === q.correct ? C.success : C.error}44`,
          borderRadius: 12, padding: 14, marginBottom: 14
        }}>
          <div style={{ fontWeight: 700, color: selected === q.correct ? C.success : C.error, marginBottom: 5, fontSize: 14 }}>
            {selected === q.correct ? "✅ נכון!" : "❌ לא נכון"}
          </div>
          <p style={{ margin: 0, fontSize: 13, lineHeight: 1.65, color: C.text }}>💡 {q.explain}</p>
        </div>
      )}

      {selected !== null && (
        <Btn onClick={next}>{isLast ? "ראה תוצאות 🏆" : "שאלה הבאה →"}</Btn>
      )}
    </div>
  );
}

function ExerciseScreen({ exercises, topicData, onComplete }) {
  const [cur, setCur] = React.useState(0);
  const [vals, setVals] = React.useState({});
  const [checked, setChecked] = React.useState(false);
  const [results, setResults] = React.useState([]);
  const [hints, setHints] = React.useState(false);

  const ex = exercises[cur];
  const isLast = cur === exercises.length - 1;

  const check = () => {
    const res = ex.blanks.map((b, i) => (vals[i] || "").trim().toLowerCase() === b.toLowerCase());
    setResults(res);
    setChecked(true);
  };

  const nextEx = () => {
    if (isLast) { onComplete(); return; }
    setCur(c => c + 1);
    setVals({}); setChecked(false); setResults([]); setHints(false);
  };

  const renderCode = () => {
    const parts = ex.code.split(/(_\d+_)/);
    let blankIdx = 0;
    return parts.map((part, i) => {
      if (/^_\d+_$/.test(part)) {
        const idx = blankIdx++;
        return (
          <input key={i}
            value={vals[idx] || ""}
            onChange={e => setVals(v => ({ ...v, [idx]: e.target.value }))}
            disabled={checked}
            style={{
              background: !checked ? "#2d3748" : results[idx] ? C.success + "33" : C.error + "33",
              border: `1px solid ${!checked ? "#4a5568" : results[idx] ? C.success : C.error}`,
              borderRadius: 4, padding: "2px 6px", color: "white",
              fontSize: 12.5, fontFamily: "monospace", width: 110, outline: "none"
            }}
          />
        );
      }
      return <span key={i} style={{ color: C.codeText }}>{part}</span>;
    });
  };

  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.text, padding: 20 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <span style={{ fontSize: 12, color: C.muted }}>תרגיל {cur + 1} / {exercises.length}</span>
        <Pill color={C.warning}>Code Challenge</Pill>
      </div>

      <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: 18, marginBottom: 14 }}>
        <h2 style={{ margin: "0 0 6px", fontSize: 16 }}>💻 {ex.title}</h2>
        <p style={{ margin: 0, color: C.muted, fontSize: 13 }}>{ex.desc}</p>
      </div>

      {/* Code with inputs */}
      <div style={{
        background: C.code, border: "1px solid #334155", borderRadius: 12,
        padding: 16, marginBottom: 14, fontFamily: "monospace", fontSize: 12.5,
        lineHeight: 2.1, overflowX: "auto", direction: "ltr", textAlign: "left"
      }}>
        {renderCode()}
      </div>

      {/* Hints toggle */}
      {!checked && (
        <button onClick={() => setHints(h => !h)} style={{
          background: "transparent", border: `1px solid ${C.warning}55`,
          borderRadius: 8, padding: "7px 14px", color: C.warning, fontSize: 13,
          cursor: "pointer", marginBottom: 12
        }}>
          💡 {hints ? "הסתר" : "הצג"} רמזים
        </button>
      )}

      {hints && !checked && (
        <div style={{ background: C.warning + "10", border: `1px solid ${C.warning}30`, borderRadius: 10, padding: 14, marginBottom: 14 }}>
          {ex.hints.map((h, i) => (
            <div key={i} style={{ fontSize: 13, color: C.warning, marginBottom: 3 }}>
              📌 ריק {i + 1}: {h}
            </div>
          ))}
        </div>
      )}

      {/* Answers after check */}
      {checked && (
        <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: 14, marginBottom: 14 }}>
          <p style={{ margin: "0 0 8px", fontWeight: 700, color: C.primaryLight, fontSize: 13 }}>תשובות נכונות:</p>
          {ex.blanks.map((b, i) => (
            <div key={i} style={{ fontSize: 13, color: results[i] ? C.success : C.error, marginBottom: 4 }}>
              {results[i] ? "✅" : "❌"} ריק {i + 1}: <code style={{ background: "#1e293b", padding: "1px 6px", borderRadius: 4, color: C.codeText }}>{b}</code>
            </div>
          ))}
        </div>
      )}

      {!checked
        ? <Btn onClick={check}>✅ בדוק תשובות</Btn>
        : <Btn onClick={nextEx}>{isLast ? "ראה תוצאות ✨" : "תרגיל הבא →"}</Btn>
      }
    </div>
  );
}

        <p style={{ color: C.muted, marginTop: 5 }}>{playerName}</p>
      </div>

      <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 16, padding: 24, marginBottom: 14, textAlign: "center" }}>
        <div style={{ fontSize: 52, fontWeight: 900, color: grade.color }}>{pct}%</div>
        <div style={{ color: C.muted, fontSize: 13, marginBottom: 14 }}>{quizScore} / {total} שאלות נכונות</div>
        <ProgressBar value={quizScore} max={total} color={grade.color} />
      </div>

      <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: 18, marginBottom: 22 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 3 }}>XP שהרווחת</div>
            <div style={{ fontSize: 24, fontWeight: 800, color: C.warning }}>+{xp} XP</div>
          </div>
          <div style={{ textAlign: "left" }}>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 3 }}>נושא</div>
            <div style={{ fontSize: 15 }}>{topicData.icon} {topicData.title}</div>
          </div>
        </div>
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        <Btn onClick={onRestart}>🔄 שחק שוב — אותו נושא</Btn>
        <Btn variant="ghost" onClick={onNewTopic}>📚 נושא חדש</Btn>
      </div>
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────────────

function App() {
  const [screen, setScreen] = React.useState("welcome");
  const [playerName, setPlayerName] = React.useState("Player");
  const [topicKey, setTopicKey] = React.useState("class");
  const [quizScore, setQuizScore] = React.useState(0);

  const topicData = TOPICS[topicKey] || TOPICS["class"];

  const start = (name, topic) => {
    setPlayerName(name);
    setTopicKey(topic.toLowerCase().trim());
    setScreen("lesson");
  };

  return (
    <div style={{ maxWidth: 480, margin: "0 auto" }}>
      {screen === "welcome" && <WelcomeScreen onStart={start} />}
      {screen === "lesson"  && <LessonScreen topicData={topicData} onNext={() => setScreen("quiz")} />}
      {screen === "quiz"    && <QuizScreen questions={topicData.questions} topicData={topicData}
        onComplete={s => { setQuizScore(s); setScreen("exercise"); }} />}
      {screen === "exercise" && <ExerciseScreen exercises={topicData.exercises} topicData={topicData}
        onComplete={() => setScreen("results")} />}
      {screen === "results" && <ResultsScreen playerName={playerName} topicData={topicData}
        quizScore={quizScore} total={topicData.questions.length}
        onRestart={() => setScreen("lesson")}
        onNewTopic={() => setScreen("welcome")} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
